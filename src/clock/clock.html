<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: #060a1b;
      color: #f4f6ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #scene {
      width: 100%;
      height: 100%;
      display: block;
    }

    .clock-panel {
      position: absolute;
      right: 8vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    .date {
      font-weight: 400;
      font-size: clamp(18px, 2.2vw, 34px);
      letter-spacing: 0.02em;
      color: rgba(225, 234, 255, 0.85);
      margin-bottom: 0.15em;
      text-shadow: 0 0 16px rgba(156, 199, 255, 0.2);
    }

    .clock {
      font-weight: 300;
      font-size: clamp(48px, 9vw, 140px);
      letter-spacing: 0.03em;
      color: rgba(245, 248, 255, 0.95);
      text-shadow: 0 0 22px rgba(156, 199, 255, 0.2);
    }

    .clock-main {
      display: inline-block;
    }

    .clock-seconds {
      font-size: 0.38em;
      margin-left: 0.2em;
      opacity: 0.9;
      vertical-align: baseline;
    }

    .clock-ampm {
      font-size: 0.34em;
      margin-left: 0.24em;
      opacity: 0.86;
      vertical-align: baseline;
      letter-spacing: 0.08em;
    }

    .travel {
      position: absolute;
      left: 24px;
      bottom: 24px;
      z-index: 2;
      border: 1px solid rgba(160, 195, 255, 0.55);
      background: rgba(10, 19, 48, 0.6);
      color: rgba(239, 246, 255, 0.95);
      font-size: 18px;
      line-height: 1;
      padding: 12px 18px;
      border-radius: 999px;
      letter-spacing: 0.06em;
      text-transform: lowercase;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .travel:hover {
      background: rgba(23, 43, 96, 0.78);
    }

    .texture-toggle {
      position: absolute;
      left: 24px;
      bottom: 78px;
      z-index: 2;
      border: 1px solid rgba(160, 195, 255, 0.55);
      background: rgba(10, 19, 48, 0.6);
      color: rgba(239, 246, 255, 0.95);
      font-size: 14px;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .texture-toggle:hover {
      background: rgba(23, 43, 96, 0.78);
    }

    .orbit-toggle {
      position: absolute;
      left: 24px;
      bottom: 132px;
      z-index: 2;
      border: 1px solid rgba(160, 195, 255, 0.55);
      background: rgba(10, 19, 48, 0.6);
      color: rgba(239, 246, 255, 0.95);
      font-size: 14px;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .orbit-toggle:hover {
      background: rgba(23, 43, 96, 0.78);
    }

    .wireframe-toggle {
      position: absolute;
      left: 24px;
      bottom: 186px;
      z-index: 2;
      border: 1px solid rgba(160, 195, 255, 0.55);
      background: rgba(10, 19, 48, 0.6);
      color: rgba(239, 246, 255, 0.95);
      font-size: 14px;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .wireframe-toggle:hover {
      background: rgba(23, 43, 96, 0.78);
    }

    .light-helper-toggle {
      position: absolute;
      left: 24px;
      /* bottom: 240px; */
      bottom: 78px;
      z-index: 2;
      border: 1px solid rgba(160, 195, 255, 0.55);
      background: rgba(10, 19, 48, 0.6);
      color: rgba(239, 246, 255, 0.95);
      font-size: 14px;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .light-helper-toggle:hover {
      background: rgba(23, 43, 96, 0.78);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div class="clock-panel">
      <div id="date" class="date"></div>
      <div id="clock" class="clock"></div>
    </div>
    <button id="lightHelperBtn" class="light-helper-toggle" type="button">light helper: off</button>
    <button id="wireframeBtn" class="wireframe-toggle" type="button">wireframe: off</button>
    <button id="orbitBtn" class="orbit-toggle" type="button">orbit: off</button>
    <!-- <button id="textureBtn" class="texture-toggle" type="button">texture: on</button> -->
    <button id="travelBtn" class="travel" type="button">travel</button>
  </div>
  <script type="module" src="/src/clock/clock.js"></script>
</body>
</html>
